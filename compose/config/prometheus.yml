global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: 'shorty'
    static_configs:
      - targets: ['shorty:4343']
    relabel_configs:
      - target_label: service
        replacement: shorty
      - target_label: application
        replacement: url-shortener
