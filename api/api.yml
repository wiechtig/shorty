openapi: "3.0.0"

info:
  version: "0.0.1"
  title: "shorty"
  description: "url-shortener management API"

servers:
  - url: "/api"

security:
  - BearerAuth: []

paths:
  /short-codes:
    post:
      summary: "Create a new short code"
      operationId: "createShortCode"
      tags:
          - "short-codes"
      requestBody:
        description: "Short code to create"
        required: true
        content:
          application/json:
              schema:
                $ref: "#/components/schemas/ShortCodeInput"
      responses:
        '201':
          description: "Short code created successfully."
          content:
              application/json:
                schema:
                  type: object
                  properties:
                    id:
                      nullable: false
                      type: "string"
        '400':
          description: "Bad Request"
        '401':
          description: "Unauthorized"
        '403':
          description: "Forbidden"
        '500':
          description: "Internal Server Error"
    get:
      summary: "List short codes"
      operationId: "listShortCodes"
      parameters:
        - name: "limit"
          in: "query"
          description: "Maximum number of results to return"
          required: false
          schema:
            type: "integer"
            format: "int32"
            default: 100
        - name: "offset"
          in: "query"
          description: "Number of items to skip before starting to collect the result set"
          required: false
          schema:
            type: "integer"
            format: "int32"
            default: 0
      responses:
        '200':
          description: "A list of short codes."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/ShortCode"
        '400':
          description: "Bad Request"
        '401':
          description: "Unauthorized"
        '403':
          description: "Forbidden"
        '500':
          description: "Internal Server Error"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "OIDC JWT Bearer token authentication"
  schemas:
    ShortCode:
      properties:
        id:
          nullable: false
          type: "integer"
        shortCode:
          nullable: false
          type: "string"
        originalUrl:
          nullable: false
          type: "string"
        createdAt:
          nullable: false
          type: "string"
        expiresAt:
          nullable: true
          type: "string"
        attributes:
          nullable: false
          type: "object"
    ShortCodeInput:
      properties:
        shortCode:
          nullable: false
          type: "string"
        originalUrl:
          nullable: false
          type: "string"
        expiresAt:
          nullable: true
          type: "string"
        attributes:
          nullable: false
          type: "object"
      required:
          - shortCode
          - originalUrl
